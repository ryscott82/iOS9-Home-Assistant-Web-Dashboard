<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Home Controls</title>
  <style>
    /* ======== RESET & BASE ======== */
    *,
    *:before,
    *:after {
      margin: 0;
      padding: 0;
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      min-height: 100%;
      font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #f2f2f7;
      color: #1c1c1e;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
    }

    /* Also color the html tag in dark mode to prevent white flashes when overscrolling */
    html.dark-theme {
      background: #0d1117;
    }

    /* ======== SETUP OVERLAY ======== */
    .setup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #f2f2f7;
      z-index: 9999;
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      padding: 24px;
    }

    .setup-overlay.hidden {
      display: none;
    }

    .setup-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
    }

    .setup-card h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #1c1c1e;
    }

    .setup-card p {
      font-size: 14px;
      color: #8e8e93;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .setup-card label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .setup-card input[type="text"],
    .setup-card input[type="password"] {
      display: block;
      width: 100%;
      background: #f2f2f7;
      border: 1px solid #e5e5ea;
      border-radius: 12px;
      color: #1c1c1e;
      font-size: 16px;
      padding: 14px 16px;
      margin-bottom: 18px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .setup-card input:focus {
      border-color: #007aff;
    }

    .setup-card .setup-btn {
      display: block;
      width: 100%;
      background: #007aff;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      -webkit-transition: opacity 0.2s;
      transition: opacity 0.2s;
    }

    .setup-card .setup-btn:active {
      opacity: 0.7;
    }

    .setup-error {
      background: rgba(255, 59, 48, 0.08);
      border: 1px solid rgba(255, 59, 48, 0.3);
      border-radius: 12px;
      color: #ff3b30;
      font-size: 14px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: none;
    }

    .setup-error.visible {
      display: block;
    }

    /* ======== APP FOOTER ======== */
    .app-footer {
      margin-top: 30px;
      padding-top: 15px;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      display: -webkit-flex;
      display: flex;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      -webkit-align-items: center;
      align-items: center;
    }

    body.dark-theme .app-footer {
      border-top-color: rgba(255, 255, 255, 0.08);
    }

    .footer-btn {
      background: none;
      border: none;
      color: #007aff;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 12px;
      cursor: pointer;
      -webkit-appearance: none;
      -webkit-transition: opacity 0.15s;
      transition: opacity 0.15s;
    }

    .footer-btn:active {
      opacity: 0.6;
    }

    body.dark-theme .footer-btn {
      color: #2f89fc;
    }

    .footer-status-group {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      cursor: pointer;
      font-size: 11.5px;
      color: #8e8e93;
    }

    .footer-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #c7c7cc;
      margin-right: 6px;
      display: inline-block;
      -webkit-transition: background 0.3s;
      transition: background 0.3s;
    }

    .footer-status.connected {
      background: #34c759;
      box-shadow: 0 0 5px rgba(52, 199, 89, 0.5);
    }

    .footer-status.error {
      background: #ff3b30;
      box-shadow: 0 0 5px rgba(255, 59, 48, 0.5);
    }

    /* ======== MAIN CONTENT ======== */
    .app-content {
      padding: 0 12px 24px 12px;
      max-width: 600px;
      margin: 0 auto;
    }

    @media (min-width: 768px) {
      .app-content {
        max-width: 1024px;
      }
    }

    /* ======== APP HEADER ======== */
    .app-header {
      display: -webkit-flex;
      display: flex;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      -webkit-align-items: center;
      align-items: center;
      margin: 0 4px 20px 4px;
      padding: 0 8px;
    }

    .header-welcome {
      font-size: 22px;
      font-weight: 700;
      color: #1c1c1e;
    }

    body.dark-theme .header-welcome {
      color: #ffffff;
    }

    .header-datetime {
      font-size: 16px;
      font-weight: 500;
      color: #8e8e93;
    }

    body.dark-theme .header-datetime {
      color: #a2a2a6;
    }

    /* ======== SVG ICONS ======== */
    .tile-icon svg {
      width: 22px;
      height: 22px;
      fill: #8e8e93;
      display: block;
    }

    .tile.active .tile-icon svg {
      fill: #ffcc00;
    }

    .tile.active-blue .tile-icon svg {
      fill: #007aff;
    }

    .tile.active-green .tile-icon svg {
      fill: #34c759;
    }

    .tile.active-orange .tile-icon svg {
      fill: #ff9f0a;
    }

    .tile.active-red .tile-icon svg,
    .tile.alert-red .tile-icon svg {
      fill: #ff3b30;
    }

    body.dark-theme .tile-icon svg {
      fill: #8b949e;
    }

    body.dark-theme .tile.active .tile-icon svg {
      fill: #ffd60a;
    }

    body.dark-theme .tile.active-blue .tile-icon svg {
      fill: #0a84ff;
    }

    body.dark-theme .tile.active-green .tile-icon svg {
      fill: #30d158;
    }

    body.dark-theme .tile.active-orange .tile-icon svg {
      fill: #ff9f0a;
    }

    body.dark-theme .tile.active-red .tile-icon svg,
    body.dark-theme .tile.alert-red .tile-icon svg {
      fill: #ff453a;
    }

    /* ======== SECTION ======== */
    .section {
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 19px;
      font-weight: 700;
      color: #1c1c1e;
      padding: 0 8px;
      margin-bottom: 8px;
    }

    /* ======== TILE GRID ======== */
    .tile-grid {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-wrap: wrap;
      flex-wrap: wrap;
      -webkit-align-items: flex-start;
      align-items: flex-start;
      margin: 0 -5px;
    }

    /* ======== TILE (base) ======== */
    .tile {
      -webkit-flex: 0 0 calc(50% - 10px);
      flex: 0 0 calc(50% - 10px);
      margin: 5px;
      background: #ffffff;
      border-radius: 18px;
      padding: 12px;
      min-height: 88px;
      position: relative;
      -webkit-transition: background 0.2s;
      transition: background 0.2s;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
    }

    @media (min-width: 768px) {
      .tile {
        -webkit-flex: 0 0 calc(25% - 10px);
        flex: 0 0 calc(25% - 10px);
      }
    }

    .tile.active {
      background: rgba(255, 214, 10, 0.08);
      box-shadow: 0 0 0 2px #ffcc00;
    }

    .tile.active-green {
      background: rgba(52, 199, 89, 0.06);
      box-shadow: 0 0 0 2px #34c759;
    }

    .tile.active-blue {
      background: rgba(0, 122, 255, 0.05);
      box-shadow: 0 0 0 2px #007aff;
    }

    .tile.active-orange {
      background: rgba(255, 159, 10, 0.06);
      box-shadow: 0 0 0 2px #ff9f0a;
    }

    .tile.active-red {
      background: rgba(255, 59, 48, 0.06);
      box-shadow: 0 0 0 2px #ff3b30;
    }

    /* Alert States (Light Theme) */
    .tile.alert-yellow {
      background: rgba(255, 214, 10, 0.14);
      border: 1px solid rgba(255, 214, 10, 0.4);
    }

    .tile.alert-yellow .sensor-value {
      color: #b58900;
    }

    .alert-text-yellow {
      color: #b58900;
    }

    .tile.alert-red {
      background: rgba(255, 59, 48, 0.12);
      border: 1px solid rgba(255, 59, 48, 0.35);
    }

    .tile.alert-red .sensor-value {
      color: #ff3b30;
    }

    .tile.unavailable {
      opacity: 0.4;
    }

    /* ======== TILE LAYOUT ======== */
    .tile-top {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .tile-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.05);
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      font-size: 20px;
    }

    .tile.active .tile-icon,
    .tile.active-green .tile-icon,
    .tile.active-blue .tile-icon,
    .tile.active-orange .tile-icon {
      background: rgba(255, 255, 255, 0.35);
    }

    .tile-bottom {
      /* name and state at bottom */
    }

    .tile-name {
      font-size: 16.5px;
      font-weight: 700;
      color: #1c1c1e;
      margin-bottom: 2px;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tile-state {
      font-size: 13px;
      color: #8e8e93;
      font-weight: 500;
    }

    .tile.active .tile-name,
    .tile.active-green .tile-name,
    .tile.active-blue .tile-name,
    .tile.active-orange .tile-name,
    .tile.active-red .tile-name {
      color: rgba(0, 0, 0, 0.85);
    }

    .tile.active .tile-state,
    .tile.active-green .tile-state,
    .tile.active-blue .tile-state,
    .tile.active-orange .tile-state,
    .tile.active-red .tile-state {
      color: rgba(0, 0, 0, 0.5);
    }



    /* ======== BRIGHTNESS SLIDER ======== */
    .slider-row {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
    }

    .slider-label {
      display: -webkit-flex;
      display: flex;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      font-size: 11px;
      color: #8e8e93;
      margin-bottom: 6px;
    }

    .tile.active .slider-label {
      color: rgba(0, 0, 0, 0.45);
    }

    .tile.active .slider-row {
      border-top-color: rgba(0, 0, 0, 0.08);
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(0, 0, 0, 0.1);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
    }

    /* ======== FULL-WIDTH TILE (climate) ======== */
    .tile.tile-full {
      -webkit-flex: 0 0 calc(100% - 10px);
      flex: 0 0 calc(100% - 10px);
    }

    @media (min-width: 768px) {
      .tile.tile-full {
        -webkit-flex: 0 0 calc(50% - 10px);
        flex: 0 0 calc(50% - 10px);
        /* Manual input cards match half width on landscape too */
      }
    }

    /* ======== HISTORY METRICS CARD ======== */
    .tile.history-tile {
      -webkit-flex: 0 0 calc(100% - 10px);
      flex: 0 0 calc(100% - 10px);
      height: 340px;
      /* Square in portrait */
      box-sizing: border-box;
    }

    @media (min-width: 768px) {
      .tile.history-tile {
        -webkit-flex: 0 0 calc(33.333% - 10px);
        flex: 0 0 calc(33.333% - 10px);
        /* 3 cards wide in landscape */
        height: 330px;
        /* Square in landscape */
      }
    }

    /* ======== MEDIA PLAYER GRID CARD ======== */
    .tile.media-tile {
      -webkit-flex: 0 0 calc(100% - 10px);
      flex: 0 0 calc(100% - 10px);
      box-sizing: border-box;
    }

    @media (min-width: 768px) {
      .tile.media-tile {
        -webkit-flex: 0 0 calc(33.333% - 10px) !important;
        flex: 0 0 calc(33.333% - 10px) !important;
        /* 3 cards wide in landscape */
      }
    }

    /* ======== VOLUME CONTROL BAR ======== */
    .volume-control-bar {
      position: relative;
      background: #f2f2f7;
      border-radius: 10px;
      height: 30px;
      overflow: hidden;
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      margin-top: 8px;
    }

    .volume-bar-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      background: #64b5f6;
      -webkit-transition: width 0.15s ease-out;
      transition: width 0.15s ease-out;
      pointer-events: none;
      z-index: 1;
    }



    .thermostat-controls {
      display: -webkit-flex;
      display: flex;
      -webkit-justify-content: center;
      justify-content: center;
      -webkit-align-items: center;
      align-items: center;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
    }

    .thermostat-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: #f2f2f7;
      color: #1c1c1e;
      font-size: 24px;
      line-height: 48px;
      text-align: center;
      cursor: pointer;
      -webkit-appearance: none;
      -webkit-transition: background 0.15s;
      transition: background 0.15s;
    }

    .thermostat-btn:active {
      background: #e5e5ea;
    }



    .mode-selector {
      display: -webkit-flex;
      display: flex;
      -webkit-justify-content: center;
      justify-content: center;
      margin-top: 12px;
    }

    .mode-btn {
      background: #f2f2f7;
      border: 1px solid #e5e5ea;
      color: #8e8e93;
      font-size: 13px;
      padding: 8px 16px;
      cursor: pointer;
      -webkit-appearance: none;
      -webkit-transition: all 0.15s;
      transition: all 0.15s;
    }

    .mode-btn:first-child {
      border-radius: 8px 0 0 8px;
    }

    .mode-btn:last-child {
      border-radius: 0 8px 8px 0;
    }

    .mode-btn.active {
      background: #007aff;
      border-color: #007aff;
      color: #ffffff;
    }

    /* ======== COVER BUTTONS ======== */
    .cover-controls {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
    }

    .cover-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.06);
      color: #1c1c1e;
      font-size: 14px;
      line-height: 32px;
      text-align: center;
      cursor: pointer;
      -webkit-appearance: none;
      margin-left: 6px;
      -webkit-transition: background 0.15s;
      transition: background 0.15s;
    }

    .cover-btn:active {
      background: rgba(0, 0, 0, 0.12);
    }

    /* ======== SENSOR VALUE ======== */
    .sensor-value {
      font-size: 20px;
      font-weight: 700;
      color: #007aff;
      text-align: right;
      margin-top: 10px;
    }

    /* ======== SPARKLINE GRAPH ======== */
    .sparkline-container {
      margin-top: 12px;
      position: relative;
      height: 65px;
      width: 100%;
    }

    .sparkline-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .sparkline-path {
      fill: none;
      stroke: #007aff;
      stroke-width: 1.5;
    }

    .sparkline-fill {
      fill: rgba(0, 122, 255, 0.08);
    }

    .grid-line {
      stroke: rgba(0, 0, 0, 0.08);
    }

    .axis-line {
      stroke: rgba(0, 0, 0, 0.15);
    }

    /* ======== DROPDOWNS (INPUT SELECT) ======== */
    .select-wrapper {
      position: relative;
      width: 100%;
      margin-top: 8px;
    }

    .select-wrapper select {
      width: 100%;
      padding: 10px 32px 10px 12px;
      border-radius: 10px;
      border: 1px solid #e5e5ea;
      background: #f2f2f7;
      color: #1c1c1e;
      font-size: 14px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      font-weight: 500;
    }

    /* ======== SEGMENTED TAB CONTROL ======== */
    .tab-bar {
      display: -webkit-flex;
      display: flex;
      background: rgba(0, 0, 0, 0.06);
      padding: 3px;
      border-radius: 12px;
      margin: 0 4px 18px 4px;
    }

    body.dark-theme .tab-bar {
      background: rgba(255, 255, 255, 0.07);
    }

    .tab-btn {
      -webkit-flex: 1;
      flex: 1;
      background: none;
      border: none;
      padding: 9px;
      font-size: 13.5px;
      font-weight: 600;
      color: #8e8e93;
      border-radius: 9px;
      cursor: pointer;
      -webkit-appearance: none;
      -webkit-transition: all 0.15s;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: #ffffff;
      color: #007aff;
      font-weight: 700;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
    }

    .tab-btn.alert-red-muted {
      background: rgba(255, 59, 48, 0.15);
      color: #d70015;
      font-weight: 700;
      border: 1px solid rgba(255, 59, 48, 0.3);
    }

    body.dark-theme .tab-btn.alert-red-muted {
      background: rgba(255, 69, 58, 0.22);
      color: #ff6b6b;
      border: 1px solid rgba(255, 69, 58, 0.35);
    }

    .tab-btn.alert-yellow-muted {
      background: rgba(255, 149, 0, 0.15);
      color: #c77000;
      font-weight: 700;
      border: 1px solid rgba(255, 149, 0, 0.3);
    }

    body.dark-theme .tab-btn.alert-yellow-muted {
      background: rgba(255, 159, 10, 0.22);
      color: #ffb340;
      border: 1px solid rgba(255, 159, 10, 0.35);
    }

    /* ======== SLIDER CONFIRM BUTTON ======== */
    .confirm-btn {
      background: #007aff;
      color: #ffffff;
      border: none;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 12px;
      cursor: pointer;
      -webkit-appearance: none;
      -webkit-transition: opacity 0.15s;
      transition: opacity 0.15s;
    }

    .confirm-btn:active {
      opacity: 0.7;
    }

    body.dark-theme .confirm-btn {
      background: #30d158;
    }

    /* ======== CHEMICAL LOG PRESET BUTTONS ======== */
    .preset-btn {
      background: #f2f2f7;
      color: #1c1c1e;
      border: none;
      padding: 0;
      border-radius: 10px;
      font-weight: 700;
      font-size: 13.5px;
      cursor: pointer;
      -webkit-appearance: none;
      -webkit-transition: background 0.15s, color 0.15s;
      transition: background 0.15s, color 0.15s;
      -webkit-flex: 1 1 0%;
      flex: 1 1 0%;
      min-width: 0;
      margin: 3px;
      height: 38px;
      display: block;
      text-align: center;
      line-height: 38px;
    }

    .preset-btn.active {
      background: #007aff !important;
      color: #ffffff !important;
    }

    body.dark-theme .preset-btn {
      background: #2c2c2e;
      color: #ffffff;
    }

    /* ======== MEDIA PLAYER CONTROL BUTTON ======== */
    .media-control-btn {
      background: none;
      border: 1px solid rgba(0, 0, 0, 0.12);
      color: #1c1c1e;
      padding: 8px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      -webkit-appearance: none;
      -webkit-transition: background 0.15s, border-color 0.15s;
      transition: background 0.15s, border-color 0.15s;
    }

    .media-control-btn:active {
      background: rgba(0, 0, 0, 0.06);
    }

    body.dark-theme .media-control-btn {
      border-color: rgba(255, 255, 255, 0.18);
      color: #e6edf3;
    }

    body.dark-theme .media-control-btn:active {
      background: rgba(255, 255, 255, 0.06);
    }

    body.dark-theme .tab-btn.active {
      background: #007aff;
      color: #ffffff;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0, 122, 255, 0.4);

  <script>
    (function () {
      "use strict";

      // ======== CONFIG ========
      var HA_URL = "http://192.168.40.88:8123";
      var HA_TOKEN = "YOUR_LONG_LIVED_ACCESS_TOKEN_HERE";
      var STORAGE_KEY = "ha_controls_config";
      var REFRESH_INTERVAL = 15000;
      var refreshTimer = null;
      var entities = {};
      var allowedEntityIds = {};
      var registryLoaded = false;
      var sensorHistory = {};
      var bannerDismissed = false;
      var selectedRecVolume = "hottub";
      var lastStatesCache = [];
      var activeStickyGroups = [];
      var entityAreaMap = {};
      var areaNameMap = {};
      var areaFloorMap = {};
      var floorNameMap = {};
      var entityRegistryDone = false;
      var areaRegistryDone = false;
      var floorRegistryDone = false;
      var recentlySkippedTracks = [];
      var activeTab = "overview";
      var activeChemTab = "inputs";
      var lastActivatedScene = "";
      var checkedTodayAlertDismissed = false;
      var themeOverride = null;
      var themeTimeout = null;

      // Chemical Inputs pending selection and 3-minute auto-expiry timers
      var selectedPresetValues = {};
      var unconfirmedTimers = {};


      // Load volume and tab choices from cache if available
      try {
        var cachedVol = localStorage.getItem("ha_rec_volume");
        if (cachedVol) selectedRecVolume = cachedVol;
        var cachedTab = localStorage.getItem("ha_active_tab");
        if (cachedTab) activeTab = cachedTab;
        var cachedChemTab = localStorage.getItem("ha_active_chem_tab");
        if (cachedChemTab) activeChemTab = cachedChemTab;
        var cachedScene = localStorage.getItem("ha_last_scene");
        if (cachedScene) lastActivatedScene = cachedScene;
      } catch (e) { }

      window.toggleMainNavigation = function () {
        if (activeTab === "overview") {
          switchTab("controls");
        } else {
          switchTab("overview");
        }
      };

      function getSvg(iconName, color) {
        var fillStyle = color ? ' style="fill:' + color + '; color:' + color + ';"' : '';
        var svgStr = '';
        if (iconName === 'light') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M12 2.25a6.75 6.75 0 00-6.75 6.75c0 2.52 1.39 4.72 3.44 5.88v2.87c0 .41.34.75.75.75h5.12c.41 0 .75-.34.75-.75v-2.87c2.05-1.16 3.44-3.36 3.44-5.88A6.75 6.75 0 0012 2.25zm2.62 14.25h-5.24v-1.1h5.24v1.1zm0-2.1h-5.24c-1.63-1.07-2.63-2.9-2.63-4.9a5.25 5.25 0 1110.5 0c0 2-.99 3.83-2.63 4.9zM9 20h6v1.25H9V20z"/></svg>';
        } else if (iconName === 'fan') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M12 2a10 10 0 1010 10A10 10 0 0012 2zm0 18a8 8 0 118-8 8 8 0 01-8 8zm0-10.5a2.5 2.5 0 102.5 2.5A2.5 2.5 0 0012 9.5zm-5.5 3a1.5 1.5 0 111.5-1.5 1.5 1.5 0 01-1.5 1.5zm11 0a1.5 1.5 0 111.5-1.5 1.5 1.5 0 01-1.5 1.5z"/></svg>';
        } else if (iconName === 'switch' || iconName === 'bolt') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M11 21h-1l1-7H5.5L13 3h1l-1 7h5.5L11 21z"/></svg>';
        } else if (iconName === 'climate' || iconName === 'temp') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M15 13V5a3 3 0 00-6 0v8a5 5 0 106 0zm-3-9a1 1 0 011 1v3h-2V5a1 1 0 011-1z"/></svg>';
        } else if (iconName === 'cover') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-1 16H6v-2h12v2zm0-4H6v-2h12v2zm0-4H6V7h12v2z"/></svg>';
        } else if (iconName === 'lock') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>';
        } else if (iconName === 'unlock') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M12 13c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm6-5h-1V6c0-2.76-2.24-5-5-5-2.28 0-4.22 1.54-4.8 3.65l1.92.51C9.48 4.09 10.63 3.1 12 3.1c1.71 0 3.1 1.39 3.1 3.1v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2z"/></svg>';
        } else if (iconName === 'humidity') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg>';
        } else if (iconName === 'battery') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M17 5H7a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2zm-1.5 12h-7v-1.5h7zm0-3h-7v-1.5h7zm0-3h-7V7.5h7z"/></svg>';
        } else if (iconName === 'illuminance') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M12 7a5 5 0 100 10 5 5 0 000-10zm0-5a1 1 0 011-1v2a1 1 0 11-2 0V3a1 1 0 011-1zm0 15a1 1 0 011 1v2a1 1 0 11-2 0v-2a1 1 0 011-1zm9-7a1 1 0 01-1 1h-2a1 1 0 110-2h2a1 1 0 011 1zM7 12a1 1 0 01-1 1H4a1 1 0 110-2h2a1 1 0 011 1z"/></svg>';
        } else if (iconName === 'motion') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M13.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM9.8 8.9L7 21h2.1l1.9-9 2.1 2v8h2v-9.9l-2.1-2 1-4.8c1.5 1.8 3.7 2.9 6.1 2.9v-2c-1.9 0-3.5-1-4.3-2.4l-1-2.4c-.4-.9-1.3-1.4-2.2-1.4-.3 0-.7.1-1 .2L4 5.1v5.9h2V7.2l2.3-.9-1.5 2.6z"/></svg>';
        } else if (iconName === 'scene') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M12 2A10 10 0 002 12c0 5.52 4.48 10 10 10a1.99 1.99 0 002-2c0-.5-.19-.97-.53-1.33l-.06-.06a.5.5 0 010-.73 2.7 2.7 0 011.91-.78H17c2.76 0 5-2.24 5-5 0-4.42-4.48-8-10-8zm-5.5 9a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm3-3a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm4.5 0a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm3 3a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/></svg>';
        } else if (iconName === 'water_heater') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M7 6c.55 0 1-.45 1-1V3c0-.55-.45-1-1-1s-1 .45-1 1v2c0 .55.45 1 1 1zm5 0c.55 0 1-.45 1-1V3c0-.55-.45-1-1-1s-1 .45-1 1v2c0 .55.45 1 1 1zm5 0c.55 0 1-.45 1-1V3c0-.55-.45-1-1-1s-1 .45-1 1v2c0 .55.45 1 1 1zM2 20h20a1 1 0 010 2H2a1 1 0 010-2zm1.6-4.5c.34-.76.95-1.34 1.71-1.63L12 11.2l6.69 2.67c.76.29 1.37.87 1.71 1.63.26.57.12 1.25-.38 1.68l-7.3 6.32a1.01 1.01 0 01-1.44 0l-7.3-6.32c-.5-.43-.64-1.11-.38-1.68z"/></svg>';
        } else if (iconName === 'list') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zm0-8h14V7H7v2z"/></svg>';
        } else if (iconName === 'house') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>';
        } else if (iconName === 'waterfall') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M4 4h16v2H4zm2 4c0 3 1.5 5 1.5 8S6 20 6 20h2s1.5-2 1.5-4-1.5-5-1.5-8zm6 0c0 3 1.5 5 1.5 8s-1.5 4-1.5 4h2s1.5-2 1.5-4-1.5-5-1.5-8zm6 0c0 3 1.5 5 1.5 8s-1.5 4-1.5 4h2s1.5-2 1.5-4-1.5-5-1.5-8z"/></svg>';
        } else if (iconName === 'bubbles') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><circle cx="6" cy="18" r="3"/><circle cx="16" cy="14" r="4"/><circle cx="8" cy="8" r="2"/><circle cx="18" cy="6" r="3"/></svg>';
        } else if (iconName === 'hottub' || iconName === 'spa') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M2 11h20v10H2zm4 2v6h2v-6zm4 0v6h2v-6zm4 0v6h2v-6zm4 0v6h2v-6zM12 2C9.2 2 7 4.2 7 7h10c0-2.8-2.2-5-5-5z"/></svg>';
        } else if (iconName === 'fire' || iconName === 'flame') {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><path d="M12 2C11.5 2 6 8.5 6 12C6 15.3 8.7 18 12 18C15.3 18 18 15.3 18 12C18 8.5 12.5 2 12 2ZM12 15C10.3 15 9 13.7 9 12C9 10.9 9.9 9 12 6.5C14.1 9 15 10.9 15 12C15 13.7 13.7 15 12 15Z"/></svg>';
        } else {
          svgStr = '<svg' + fillStyle + ' viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /></svg>';
        }
        return svgStr;
      }

      function getEntityIcon(entity, domain) {
        if (!entity) return domain;
        var eid = entity.entity_id.toLowerCase();
        var name = (friendlyName(entity) || "").toLowerCase();
        
        if (eid === "switch.pool_waterfall" || name.indexOf("waterfall") !== -1) {
          return "waterfall";
        }
        if (eid === "switch.hot_tub_air_blower" || name.indexOf("air blower") !== -1 || name.indexOf("blower") !== -1) {
          return "bubbles";
        }
        if (eid.indexOf("hot_tub") !== -1 || eid.indexOf("hottub") !== -1 || name.indexOf("hot tub") !== -1 || name.indexOf("hottub") !== -1 || name.indexOf("spa") !== -1) {
          return "hottub";
        }
        if (domain === "water_heater" || eid.indexOf("heater") !== -1 || name.indexOf("heater") !== -1) {
          return "fire";
        }
        return domain;
      }

      function getRoomName(entity) {
        if (!entity) return "";
        var eid = entity.entity_id;
        if (entityAreaMap[eid] && areaNameMap[entityAreaMap[eid]]) {
          return areaNameMap[entityAreaMap[eid]];
        }
        var name = friendlyName(entity);
        var lower = name.toLowerCase();
        
        var rooms = [
          "master bedroom", "ryan's bedroom", "mason's bedroom", "keira's bedroom",
          "living room", "kitchen", "family room", "dining room", "office",
          "gym", "game room", "workout room", "home theater",
          "backyard", "pool", "hot tub", "patio", "garage"
        ];
        for (var r = 0; r < rooms.length; r++) {
          if (lower.indexOf(rooms[r]) !== -1) {
            return rooms[r].replace(/\b\w/g, function(l){ return l.toUpperCase(); });
          }
        }
        return "";
      }

      function getFloor(entity) {
        if (!entity) return "Other";
        var eid = entity.entity_id;
        if (entityAreaMap[eid]) {
          var areaId = entityAreaMap[eid];
          if (areaFloorMap[areaId]) {
            var floorId = areaFloorMap[areaId];
            if (floorNameMap[floorId]) {
              return floorNameMap[floorId];
            }
          }
        }
        var name = (friendlyName(entity) || "").toLowerCase();
        var lowerEid = eid.toLowerCase();

        if (name.indexOf("basement") !== -1 || lowerEid.indexOf("basement") !== -1) {
          return "Basement";
        }
        if (name.indexOf("upstairs") !== -1 || lowerEid.indexOf("upstairs") !== -1 || 
            name.indexOf("second") !== -1 || lowerEid.indexOf("second") !== -1 || 
            name.indexOf("2nd") !== -1 || lowerEid.indexOf("2nd") !== -1 || 
            name.indexOf("loft") !== -1 || lowerEid.indexOf("loft") !== -1) {
          return "Upstairs";
        }
        if (name.indexOf("outdoor") !== -1 || lowerEid.indexOf("outdoor") !== -1 || 
            name.indexOf("patio") !== -1 || lowerEid.indexOf("patio") !== -1 || 
            name.indexOf("pool") !== -1 || lowerEid.indexOf("pool") !== -1 || 
            name.indexOf("deck") !== -1 || lowerEid.indexOf("deck") !== -1 || 
            name.indexOf("yard") !== -1 || lowerEid.indexOf("yard") !== -1 || 
            name.indexOf("hottub") !== -1 || lowerEid.indexOf("hottub") !== -1 || 
            name.indexOf("hot tub") !== -1 || lowerEid.indexOf("hot_tub") !== -1 || 
            name.indexOf("exterior") !== -1 || lowerEid.indexOf("exterior") !== -1 || 
            name.indexOf("garage") !== -1 || lowerEid.indexOf("garage") !== -1) {
          return "Outdoor";
        }
        return "Main Floor";
      }

      window.handleCardClick = function (event, entityId, domain) {
        var target = event.target || event.srcElement;
        while (target && target !== event.currentTarget) {
          var tag = target.tagName.toLowerCase();
          if (tag === "input" || tag === "button" || tag === "select" || tag === "label" || 
              target.classList.contains("toggle-slider") || 
              target.classList.contains("thermostat-btn") || 
              target.classList.contains("cover-btn") || 
              target.classList.contains("mode-btn") || 
              target.classList.contains("preset-btn") || 
              target.classList.contains("footer-btn") || 
              target.classList.contains("confirm-btn") || 
              target.classList.contains("select-wrapper")) {
            return;
          }
          target = target.parentNode;
        }

        if (domain === "light" || domain === "switch" || domain === "input_boolean" || domain === "fan") {
          toggleEntity(entityId, domain);
        } else if (domain === "lock") {
          var entity = null;
          for (var i = 0; i < lastStatesCache.length; i++) {
            if (lastStatesCache[i].entity_id === entityId) {
              entity = lastStatesCache[i];
              break;
            }
          }
          var isLocked = entity && entity.state === "locked";
          toggleLock(entityId, !isLocked);
        }
      };

      function getActiveSvgColor(domain, state) {
        if (domain === "light") return "#ffcc00";
        if (domain === "lock" && state === "locked") return "#34c759";
        if (domain === "climate") {
          if (state === "heat") return "#ff9f0a";
          if (state === "cool") return "#007aff";
          return "#34c759";
        }
        if (domain === "switch" || domain === "input_boolean" || domain === "fan" || domain === "cover" || domain === "media_player") {
          return "#007aff";
        }
        return "#007aff";
      }

      function renderOverviewCard(entity) {
        var domain = entity.entity_id.split(".")[0];
        var name = escapeHtml(friendlyName(entity));
        var room = escapeHtml(getRoomName(entity));
        var eid = escapeHtml(entity.entity_id);
        var state = entity.state || "off";
        var unavailable = state === "unavailable";
        var attrs = entity.attributes || {};
        var isOn = false;

        if (domain === "light" || domain === "switch" || domain === "fan" || domain === "input_boolean") {
          isOn = (state === "on" || state === "On");
        } else if (domain === "lock") {
          isOn = (state === "locked");
        } else if (domain === "climate" || domain === "water_heater") {
          isOn = (state !== "off" && state !== "Off" && !unavailable);
        } else if (domain === "cover") {
          isOn = (state === "open" || state === "opening");
        } else {
          isOn = (state !== "off" && !unavailable && state !== "closed");
        }

        var targetTemp = attrs.temperature || "--";
        var currentTemp = attrs.current_temperature || "--";
        var isTargetEqualsCurrent = false;
        if (targetTemp !== "--" && currentTemp !== "--" && parseFloat(targetTemp) === parseFloat(currentTemp)) {
          isTargetEqualsCurrent = true;
        }

        var activeClass = "";
        if (isOn) {
          if (domain === "climate" || domain === "water_heater") {
            if (isTargetEqualsCurrent) {
              activeClass = " active-red-outline"; // Red outline only when set == actual
            } else {
              activeClass = " active-red"; // Full red tint + outline when actively heating/cooling
            }
          } else if (domain === "light") {
            activeClass = " active";
          } else if (domain === "lock") {
            activeClass = " active-green";
          } else {
            activeClass = " active-blue";
          }
        }

        var iconName = getEntityIcon(entity, domain);
        var icon = getSvg(iconName, isOn ? (domain === "climate" || domain === "water_heater" ? "#ff3b30" : getActiveSvgColor(domain, state)) : "");

        var stateControlHtml = "";
        if (domain === "climate") {
          var unit = attrs.unit_of_measurement || "°";
          if (unit === "°F" || unit === "°C") unit = "°";
          var stateText = currentTemp + unit + " • Set " + targetTemp + unit;
          if (!unavailable) {
            stateControlHtml = '<div style="display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; gap:6px; margin-left:12px; -webkit-flex-shrink:0; flex-shrink:0;">';
            stateControlHtml += '<button class="thermostat-btn" style="width:36px; height:36px; line-height:36px; font-size:18px; margin:0;" onclick="adjustTemp(\'' + eid + '\', -0.5)">&minus;</button>';
            stateControlHtml += '<span class="thermostat-temp-val" style="font-size:15px; font-weight:800; min-width:85px; text-align:center;">' + stateText + '</span>';
            stateControlHtml += '<button class="thermostat-btn" style="width:36px; height:36px; line-height:36px; font-size:18px; margin:0;" onclick="adjustTemp(\'' + eid + '\', 0.5)">+</button>';
            stateControlHtml += '</div>';
          } else {
            stateControlHtml = '<div class="tile-state" style="font-size:15px; font-weight:700; margin-left:14px; white-space:nowrap; -webkit-flex-shrink:0; flex-shrink:0;">' + stateText + '</div>';
          }
        } else if (domain === "water_heater") {
          var unit = attrs.unit_of_measurement || "°";
          if (unit === "°F" || unit === "°C") unit = "°";
          var stateText = currentTemp + unit + (targetTemp !== "--" ? " • Set " + targetTemp + unit : "");
          if (!unavailable) {
            stateControlHtml = '<div style="display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; gap:6px; margin-left:12px; -webkit-flex-shrink:0; flex-shrink:0;">';
            stateControlHtml += '<button class="thermostat-btn" style="width:36px; height:36px; line-height:36px; font-size:18px; margin:0;" onclick="adjustWaterHeaterTemp(\'' + eid + '\', -1)">&minus;</button>';
            stateControlHtml += '<span class="thermostat-temp-val" style="font-size:15px; font-weight:800; min-width:75px; text-align:center;">' + stateText + '</span>';
            stateControlHtml += '<button class="thermostat-btn" style="width:36px; height:36px; line-height:36px; font-size:18px; margin:0;" onclick="adjustWaterHeaterTemp(\'' + eid + '\', 1)">+</button>';
            stateControlHtml += '</div>';
          } else {
            stateControlHtml = '<div class="tile-state" style="font-size:15px; font-weight:700; margin-left:14px; white-space:nowrap; -webkit-flex-shrink:0; flex-shrink:0;">' + stateText + '</div>';
          }
        } else if (domain === "input_select") {

      function updateClock() {
        var now = new Date();

        var months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        var dayName = days[now.getDay()];
        var monthName = months[now.getMonth()];
        var dateNum = now.getDate();

        var hours = now.getHours();
        var minutes = now.getMinutes();
        var ampm = hours >= 12 ? "PM" : "AM";
        hours = hours % 12;
        hours = hours ? hours : 12;
        var minutesStr = minutes < 10 ? "0" + minutes : minutes;

        var dateStr = dayName + ", " + monthName + " " + dateNum;
        var timeStr = hours + ":" + minutesStr + " " + ampm;

        var el = document.getElementById("headerDateTime");
        if (el) {
          el.textContent = dateStr + " • " + timeStr;

      // ======== ENTITY REGISTRY (WebSocket) ========
      function loadEntityRegistry() {
        var wsUrl = HA_URL.replace(/^http/, "ws") + "/api/websocket";
        var ws;
        try {
          ws = new WebSocket(wsUrl);
        } catch (e) {
          showToast("WebSocket failed: " + e, true);
          return;
        }
        var msgId = 1;
        var entityRequestId = -1;
        var areaRequestId = -1;
        var floorRequestId = -1;
        var responsesReceived = 0;

        // 1.5 second fallback timeout to bypass blocking spinner if requests hang
        var fallbackTimeout = setTimeout(function () {
          if (!registryLoaded) {
            registryLoaded = true;
            try { ws.close(); } catch (e) {}
            refreshAll();
          }
        }, 1500);

        ws.onmessage = function (event) {
          var msg;
          try { msg = JSON.parse(event.data); } catch (e) { return; }

          if (msg.type === "auth_required") {
            ws.send(JSON.stringify({
              type: "auth",
              access_token: HA_TOKEN
            }));
          }
          else if (msg.type === "auth_ok") {
            entityRequestId = msgId++;
            ws.send(JSON.stringify({
              id: entityRequestId,
              type: "config/entity_registry/list"
            }));
            areaRequestId = msgId++;
            ws.send(JSON.stringify({
              id: areaRequestId,
              type: "config/area_registry/list"
            }));
            floorRequestId = msgId++;
            ws.send(JSON.stringify({
              id: floorRequestId,
              type: "config/floor_registry/list"
            }));
          }
          else if (msg.type === "auth_invalid") {
            clearTimeout(fallbackTimeout);
            showToast("Auth failed", true);
            ws.close();
          }
          else if (msg.type === "result") {
            if (msg.id === entityRequestId || msg.id === areaRequestId || msg.id === floorRequestId) {
              responsesReceived++;
              var res = msg.result || [];

              if (msg.id === entityRequestId && msg.success) {
                allowedEntityIds = {};
                entityAreaMap = {};
                for (var i = 0; i < res.length; i++) {
                  var entry = res[i];
                  if (entry.area_id) {
                    entityAreaMap[entry.entity_id] = entry.area_id;
                  }
                  var labels = entry.labels || [];
                  for (var j = 0; j < labels.length; j++) {
                    if (labels[j] === "ipaddashboard") {
                      allowedEntityIds[entry.entity_id] = true;
                      break;
                    }
                  }
                }
                entityRegistryDone = true;
              } else if (msg.id === areaRequestId && msg.success) {
                areaFloorMap = {};
                areaNameMap = {};
                for (var i = 0; i < res.length; i++) {
                  var entry = res[i];
                  if (entry.area_id) {
                    if (entry.name) areaNameMap[entry.area_id] = entry.name;
                    if (entry.floor_id) areaFloorMap[entry.area_id] = entry.floor_id;
                  }
                }
                areaRegistryDone = true;
              } else if (msg.id === floorRequestId && msg.success) {
                floorNameMap = {};
                for (var i = 0; i < res.length; i++) {
                  var entry = res[i];
                  if (entry.floor_id && entry.name) {
                    floorNameMap[entry.floor_id] = entry.name;
                  }
                }
                floorRegistryDone = true;
              }

              if (responsesReceived === 3 || (msg.id === entityRequestId && !msg.success)) {
                clearTimeout(fallbackTimeout);
                registryLoaded = true;
                var debugList = [];
                for (var k in allowedEntityIds) {
                  if (allowedEntityIds.hasOwnProperty(k)) debugList.push(k);
                }
                window._debugEntities = debugList;
                ws.close();
                refreshAll();
              }
            }
          }
        };

        ws.onerror = function () {
          clearTimeout(fallbackTimeout);
          showToast("WebSocket connection failed", true);
        };
      }

      // ======== SETUP ========
      window.connectHA = function () {
        var url = document.getElementById("haUrl").value.replace(/\/+$/, "");
        var token = document.getElementById("haToken").value.replace(/^\s+|\s+$/g, "");
        var errEl = document.getElementById("setupError");

        if (!url) {
          errEl.textContent = "Please enter a Home Assistant URL.";
          errEl.className = "setup-error visible";
          return;
        }
        if (!token) {
          errEl.textContent = "Please enter a long-lived access token.";
          errEl.className = "setup-error visible";
          return;
        }

        errEl.className = "setup-error";
        document.getElementById("setupBtn").textContent = "Connecting...";

        HA_URL = url;
        HA_TOKEN = token;

        haRequest("GET", "/api/", null, function (err, data) {
          document.getElementById("setupBtn").textContent = "Connect";
          if (err) {
            errEl.textContent = "Connection failed: " + err;
            errEl.className = "setup-error visible";
            return;
          }
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ url: HA_URL, token: HA_TOKEN }));
          } catch (e) { }
          hideSetup();
          refreshAll();
        });
      };

      function isMasterSwitch(entity) {
        if (!entity) return false;
        var name = (friendlyName(entity) || "").toLowerCase();
        var eid = (entity.entity_id || "").toLowerCase();
        var labelsStr = "";
        if (entity.attributes) {
          if (entity.attributes.labels) {
            labelsStr = JSON.stringify(entity.attributes.labels).toLowerCase();
          } else if (entity.attributes.label) {
            labelsStr = String(entity.attributes.label).toLowerCase();
          }
        }
        return (
          name.indexOf("master room switch") !== -1 ||
          eid.indexOf("master_room_switch") !== -1 ||
          name.indexOf("ipaddashboard") !== -1 ||
          eid.indexOf("ipaddashboard") !== -1 ||
          name.indexOf("ipad dashboard") !== -1 ||
          labelsStr.indexOf("master room switch") !== -1
        );
      }

      function hideSetup() {
        document.getElementById("setupOverlay").className = "setup-overlay hidden";
        document.getElementById("appContent").style.display = "";
      }

      window.showSetup = function () {
        document.getElementById("setupOverlay").className = "setup-overlay";
        document.getElementById("haUrl").value = HA_URL;
        document.getElementById("haToken").value = HA_TOKEN;
      };

      // ======== HTTP ========
      function haRequest(method, path, body, callback) {
        var xhr = new XMLHttpRequest();
        xhr.open(method, HA_URL + path, true);
        xhr.setRequestHeader("Authorization", "Bearer " + HA_TOKEN);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.timeout = 10000;

        xhr.onload = function () {
          if (xhr.status >= 200 && xhr.status < 300) {
            var data = null;
            try { data = JSON.parse(xhr.responseText); } catch (e) { data = xhr.responseText; }
            callback(null, data);
          } else {
            callback("HTTP " + xhr.status);
          }
        };
        xhr.onerror = function () { callback("Network error"); };
        xhr.ontimeout = function () { callback("Timeout"); };

        if (body) {
          xhr.send(JSON.stringify(body));
        } else {
          xhr.send();
        }
      }

      // ======== REFRESH ========
      window.refreshAll = function () {
        if (refreshTimer) clearTimeout(refreshTimer);

        haRequest("GET", "/api/states", null, function (err, data) {
          if (err) {
            setStatus("error");
            showToast("Connection error: " + err, true);
            refreshTimer = setTimeout(refreshAll, REFRESH_INTERVAL);
            return;
          }

          setStatus("connected");
          entities = {};
          var i;
          for (i = 0; i < data.length; i++) {
            entities[data[i].entity_id] = data[i];
          }
          renderDashboard(data);
          refreshTimer = setTimeout(refreshAll, REFRESH_INTERVAL);
        });
      };

      // ======== RENDER ========
      function renderDashboard(allStates) {
        var welcomeMessage = "Welcome Home";
        for (var i = 0; i < allStates.length; i++) {
          if (allStates[i].entity_id === "input_text.dashboard_welcome_message") {
            welcomeMessage = allStates[i].state || "Welcome Home";
            break;
          }
        }
        var headerWelcomeEl = document.getElementById("headerWelcome");
        if (headerWelcomeEl) {
          headerWelcomeEl.textContent = welcomeMessage;
        }

        var isNight = false;
        if (themeOverride === "dark") {
          isNight = true;
        } else if (themeOverride === "light") {
          isNight = false;
        } else {
          var sunFound = false;
          for (var i = 0; i < allStates.length; i++) {
            if (allStates[i].entity_id === "sun.sun") {
              isNight = allStates[i].state === "below_horizon";
              sunFound = true;
              break;
            }
          }
          if (!sunFound) {
            var hr = new Date().getHours();
            isNight = (hr >= 18 || hr < 6);
          }
        }

        if (isNight) {
          document.documentElement.className = "dark-theme";
          document.body.className = "dark-theme";
          var metaStatus = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
          if (metaStatus) metaStatus.setAttribute('content', 'black-translucent');
        } else {
          document.documentElement.className = "";
          document.body.className = "";
          var metaStatus = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
          if (metaStatus) metaStatus.setAttribute('content', 'default');
        }

        var themeToggleBtn = document.getElementById("themeToggleBtn");
        if (themeToggleBtn) {
          themeToggleBtn.textContent = isNight ? "☀️ Light" : "🌙 Dark";
        }

        var lights = [];
        var switches = [];
        var climates = [];
        var covers = [];
        var sensors = [];
        var scenes = [];
        var locks = [];
        var fans = [];
        var waterHeaters = [];
        var inputSelects = [];
        var inputNumbers = [];
        var mediaPlayers = [];
        var i, eid, domain;

        for (i = 0; i < allStates.length; i++) {
          eid = allStates[i].entity_id;
          domain = eid.split(".")[0];

          if (!allowedEntityIds[eid] && domain !== "water_heater" && eid !== "input_boolean.chemicals_checked_today") continue;
          if (eid === "input_boolean.chemicals_checked_today") continue;

          if (domain === "light") lights.push(allStates[i]);
          else if (domain === "switch" || domain === "input_boolean") switches.push(allStates[i]);
          else if (domain === "climate") climates.push(allStates[i]);
          else if (domain === "cover") covers.push(allStates[i]);
          else if (domain === "sensor" || domain === "binary_sensor") sensors.push(allStates[i]);
          else if (domain === "scene") scenes.push(allStates[i]);
          else if (domain === "lock") locks.push(allStates[i]);
          else if (domain === "fan") fans.push(allStates[i]);
          else if (domain === "water_heater") waterHeaters.push(allStates[i]);
          else if (domain === "input_select") inputSelects.push(allStates[i]);
          else if (domain === "input_number") inputNumbers.push(allStates[i]);
          else if (domain === "media_player") mediaPlayers.push(allStates[i]);
        }

        // Save states to cache for dynamic toggle changes
        lastStatesCache = allStates;

        // Check if chemicals were logged today
        var chemicalsCheckedToday = true;
        for (i = 0; i < allStates.length; i++) {
          if (allStates[i].entity_id === "input_boolean.chemicals_checked_today") {
            chemicalsCheckedToday = (allStates[i].state === "on" || allStates[i].state === "On");
            break;
          }
        }

        // Evaluate if dismissal has expired (3 hour cooldown snoozing)
        if (!chemicalsCheckedToday) {
          try {
            var lastDismissed = localStorage.getItem("ha_chem_prompt_dismissed_time");
            if (lastDismissed) {
              var elapsed = Date.now() - parseInt(lastDismissed, 10);
              if (elapsed >= 3 * 60 * 60 * 1000) { // 3 hours
                checkedTodayAlertDismissed = false; // Reset cooldown
              }
            }
          } catch (e) { }
        } else {
          // Clear dismissal timestamp once checked so tomorrow it prompts immediately
          try { localStorage.removeItem("ha_chem_prompt_dismissed_time"); } catch (e) { }
          checkedTodayAlertDismissed = false;
        }

        var checkedTodayOverlay = document.getElementById("checkedTodayOverlay");
        if (checkedTodayOverlay) {
          checkedTodayOverlay.className = "setup-overlay hidden";
        }

        // Generate recommendations lists separately by volume context
        var htRedRecs = [];
        var poolRedRecs = [];

        var htRecData = getRecommendationsData(allStates, "hottub");
        for (i = 0; i < htRecData.length; i++) {
          if (htRecData[i].severity === "red") {
            htRedRecs.push(htRecData[i].text);
          }
        }

        var poolRecData = getRecommendationsData(allStates, "pool");
        for (i = 0; i < poolRecData.length; i++) {
          if (poolRecData[i].severity === "red") {
            poolRedRecs.push(poolRecData[i].text);

        var cActive = activeTab === "controls" ? " active" : "";
        var chActive = activeTab === "chemicals" ? " active" : "";

        html += '<button class="tab-btn' + cActive + '" onclick="switchTab(\'controls\')">Controls</button>';

            html += '<button class="tab-btn active" style="background:#ff3b30; color:#ffffff; font-weight:700; border:none;" onclick="switchTab(\'chemicals\')">🚨 Chemical Alert</button>';

            html += '<button class="tab-btn alert-red-muted" onclick="switchTab(\'chemicals\')">🚨 Chemical Alert</button>';

        html += '</div>';

        // RENDER BASED ON ACTIVE TAB
        document.body.className = (themeOverride === "dark" || isNight ? "dark-theme " : "") + "tab-" + activeTab;

        if (activeTab === "overview") {
          // Render Overview Welcome Header with prominent Controls & Menu button
          var welcomeMsg = "Welcome Home";
          for (var w = 0; w < allStates.length; w++) {
            if (allStates[w].entity_id === "input_text.dashboard_welcome_message") {
              welcomeMsg = allStates[w].state || "Welcome Home";
              break;
            }
          }

          html += '<div style="display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; -webkit-justify-content:space-between; justify-content:space-between; width:100%; padding:14px 12px 10px 12px; box-sizing:border-box;">';
          html += '<div>';
          html += '<div style="font-size:22px; font-weight:800; color:inherit;">' + escapeHtml(welcomeMsg) + '</div>';
          html += '<div class="overview-clock" style="font-size:13px; font-weight:600; color:#8e8e93; margin-top:2px;"></div>';

            var mp = mediaPlayers[i];
            if (mp.state === "playing" || mp.state === "paused") {
              var key = getMediaGroupKey(mp);
              if (key) {
                if (!songGroups[key]) {
                  songGroups[key] = [];
